<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4f7df5" />
    <title>欢迎使用万年历</title>
    <style>
      :root {
        --bg: #fafbfc; --card: #ffffff; --text: #1a1a2e; --secondary: #5a6a7e;
        --border: #e4e9f0; --accent: #4f7df5; --accent-to: #6c5ce7;
        --accent-soft: rgba(79, 125, 245, 0.08);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c1222; --card: #1a2540; --text: #e8ecf4; --secondary: #8e9bae;
          --border: #253350; --accent: #5b8af5; --accent-to: #7c6cf7;
          --accent-soft: rgba(91, 138, 245, 0.15);
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 0; background: var(--bg); color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased;
        display: flex; align-items: center; justify-content: center;
      }
      .wrap {
        max-width: 480px; width: 100%; padding: 32px 20px;
        display: flex; flex-direction: column; align-items: center; text-align: center;
      }
      .logo {
        width: 96px; height: 96px; border-radius: 24px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-to) 100%);
        display: flex; align-items: center; justify-content: center;
        color: white; font-weight: bold; font-size: 56px;
        box-shadow: 0 12px 32px var(--accent-soft);
        margin-bottom: 24px;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      h1 { font-size: 28px; margin: 0 0 8px; font-weight: 700; }
      .tagline { color: var(--secondary); font-size: 14px; margin: 0 0 32px; }

      .feature-list {
        width: 100%; margin: 0 0 32px; padding: 0; list-style: none;
      }
      .feature {
        background: var(--card); border: 1px solid var(--border);
        border-radius: 16px; padding: 16px 18px; margin-bottom: 10px;
        display: flex; align-items: center; gap: 14px; text-align: left;
        transition: transform 0.2s;
      }
      .feature:hover { transform: translateY(-1px); }
      .feature-icon {
        width: 40px; height: 40px; border-radius: 10px;
        background: var(--accent-soft); color: var(--accent);
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; flex-shrink: 0;
      }
      .feature-text { flex: 1; }
      .feature-text strong { display: block; font-size: 14px; margin-bottom: 2px; }
      .feature-text span { font-size: 12px; color: var(--secondary); }

      .cta {
        display: block; width: 100%; padding: 16px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-to) 100%);
        color: white; text-align: center; text-decoration: none;
        border-radius: 16px; font-weight: 600; font-size: 16px;
        box-shadow: 0 4px 16px var(--accent-soft);
        transition: transform 0.2s, box-shadow 0.2s;
        border: none; cursor: pointer;
        font-family: inherit;
      }
      .cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-soft); }
      .cta:active { transform: scale(0.98); }

      .footer {
        margin-top: 24px; font-size: 12px; color: var(--secondary);
      }
      .footer a { color: var(--accent); text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">万</div>
      <h1>欢迎使用万年历</h1>
      <p class="tagline">公历 · 农历 · 老黄历 · 日程管理</p>

      <ul class="feature-list">
        <li class="feature">
          <div class="feature-icon">📅</div>
          <div class="feature-text">
            <strong>三历合一</strong>
            <span>公历、农历、黄历同步显示</span>
          </div>
        </li>
        <li class="feature">
          <div class="feature-icon">🎨</div>
          <div class="feature-text">
            <strong>6 款主题</strong>
            <span>经典 / iOS 26 / Google / 海岛 / 太极 / 禅意</span>
          </div>
        </li>
        <li class="feature">
          <div class="feature-icon">🔒</div>
          <div class="feature-text">
            <strong>隐私优先</strong>
            <span>所有数据仅保存在您的设备本地</span>
          </div>
        </li>
        <li class="feature">
          <div class="feature-icon">📝</div>
          <div class="feature-text">
            <strong>日程管理</strong>
            <span>支持重复、提醒、颜色分类</span>
          </div>
        </li>
      </ul>

      <a href="/" class="cta">开始使用</a>

      <p class="footer">
        如有问题请访问 <a href="support.html">技术支持</a>
      </p>
    </div>
  </body>
</html>
